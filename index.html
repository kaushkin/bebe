<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Бебе блин блинский</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Стартовый экран -->
    <div id="startScreen" class="start-screen">
        <div class="start-content">
            <h2 id="uiTitle">Flappy Бебе</h2>
            <p id="uiSubtitle">Тапай по экрану, чтобы барашек летел.<br>Уворачивайся от розовых труб!</p>
            <p id="uiCredits" class="credits">создатель Кай и сделал это от скуки для бебе ✌️</p>
            <button id="startBtn" class="start-btn">Погнали!</button>
        </div>
    </div>

    <!-- Игровой экран -->
    <div class="game-container hidden" id="gameContainer">
        <div class="score-display">
            <span id="score">0</span>
        </div>
        <div id="playArea" class="play-area">
            <div id="bebe">
                <img src="https://raw.githubusercontent.com/iamcal/emoji-data/master/img-apple-160/1f411.png" alt="Бебе" class="sheep-emoji">
            </div>
            <!-- Трубы будут генерироваться тут -->
        </div>
    </div>

    <!-- Экран смерти -->
    <div id="gameOverScreen" class="start-screen hidden" style="z-index: 2000;">
        <div class="start-content">
            <h2 id="uiGameOverTitle">ОКАК! Приехали.</h2>
            <p><span id="uiScoreText">Ты набрала: </span><span id="finalScore">0</span></p>
            <p style="color: #ff9800;"><span id="uiBestScoreText">Рекорд: </span><span id="bestScore">0</span> 👑</p>
            <button id="restartBtn" class="start-btn">Еще разок</button>
        </div>
    </div>

    <script src="words.js"></script>
    <script src="script.js"></script>
</body>
</html>
